<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f5f0;--surface:#ffffff;--ink:#111111;--ink-muted:#6b6b6b;--ink-faint:#b0afa8;--border:rgba(0,0,0,.1);--serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--nav-h:64px;--r:2px;--t:.2s ease}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
.skip-link{position:absolute;top:-100%;left:1rem;background:var(--ink);color:#fff;padding:.5rem 1rem;font-size:.875rem;font-weight:500;z-index:9999;text-decoration:none;border-radius:0 0 4px 4px;transition:top .2s}
.skip-link:focus{top:0}
:focus-visible{outline:2px solid var(--ink);outline-offset:3px;border-radius:2px}

/* NAV */
.site-header{position:fixed;top:0;left:0;right:0;z-index:160;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;background:rgba(247,245,240,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--serif);font-size:1.1rem;color:var(--ink);text-decoration:none;letter-spacing:-.01em;transition:opacity var(--t)}
.nav-logo:hover{opacity:.65}
.nav-links{display:flex;gap:.25rem;list-style:none}
.nav-links a{display:inline-block;font-size:.8rem;font-weight:400;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-muted);text-decoration:none;padding:.4rem .75rem;border-radius:3px;transition:color var(--t),background var(--t)}
.nav-links a:hover{color:var(--ink);background:rgba(0,0,0,.05)}
.nav-links a[aria-current=page]{color:var(--ink);font-weight:500}
.nav-hamburger{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;width:44px;height:44px;background:none;border:none;cursor:pointer;padding:0;z-index:200;position:relative;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.nav-hamburger span{display:block;width:22px;height:1.5px;background:var(--ink);transition:transform .25s,opacity .25s;transform-origin:center}
.nav-hamburger[aria-expanded=true] span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.nav-hamburger[aria-expanded=true] span:nth-child(2){opacity:0;transform:scaleX(0)}
.nav-hamburger[aria-expanded=true] span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.nav-mobile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;position:fixed;inset:0;z-index:150;background:rgba(247,245,240,.98);backdrop-filter:blur(16px);opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;pointer-events:none}
.nav-mobile.open{opacity:1;visibility:visible;pointer-events:auto}
.nav-mobile a{font-family:var(--serif);font-size:2rem;color:var(--ink);text-decoration:none;transition:opacity var(--t)}
.nav-mobile a:hover{opacity:.45}

/* PAGE HEADER */
.page-header{padding:calc(var(--nav-h) + 5rem) 2.5rem 4rem;max-width:1100px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.page-eyebrow{font-size:.75rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:1rem;display:flex;align-items:center;gap:.75rem}
.page-eyebrow::before{content:'';display:inline-block;width:2rem;height:1px;background:var(--ink-muted)}
.page-title{font-family:var(--serif);font-size:clamp(3rem,6vw,5rem);line-height:1;letter-spacing:-.02em;color:var(--ink)}
.page-title em{font-style:italic;color:var(--ink-muted)}
.page-stats{display:flex;gap:2.5rem;padding-bottom:.5rem}
.page-stat-num{font-family:var(--serif);font-size:2rem;line-height:1;color:var(--ink)}
.page-stat-label{font-size:.78rem;font-weight:300;color:var(--ink-muted);margin-top:.2rem}

/* FILTERS */
.filters-wrap{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:sticky;top:var(--nav-h);z-index:10}
.filters{max-width:1100px;margin:0 auto;padding:0 2.5rem;display:flex;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{font-size:.78rem;font-weight:400;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-muted);background:none;border:none;border-bottom:2px solid transparent;padding:1rem 1.25rem;cursor:pointer;white-space:nowrap;transition:color var(--t),border-color var(--t)}
.filter-btn:hover{color:var(--ink)}
.filter-btn.active,.filter-btn[aria-pressed=true]{color:var(--ink);border-bottom-color:var(--ink)}

/* FEATURED */
.featured-wrap{max-width:1100px;margin:0 auto;padding:3rem 2.5rem 0}
.featured-card{display:grid;grid-template-columns:1fr 1fr;background:var(--ink);color:#fff;cursor:pointer;overflow:hidden;transition:opacity var(--t)}
.featured-card:hover{opacity:.92}
.featured-img-wrap{overflow:hidden;aspect-ratio:4/3}
.featured-img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(75%);transition:filter .4s}
.featured-card:hover .featured-img{filter:grayscale(0%)}
.featured-img-placeholder{width:100%;height:100%;min-height:300px;background:#1a1a1a}
.featured-content{padding:3rem;display:flex;flex-direction:column;justify-content:space-between}
.featured-badge{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem}
.featured-badge::before{content:'';display:inline-block;width:1.5rem;height:1px;background:rgba(255,255,255,.4)}
.featured-title{font-family:var(--serif);font-size:clamp(1.5rem,2.5vw,2rem);line-height:1.2;color:#fff;margin-bottom:1.5rem}
.featured-excerpt{font-size:.92rem;font-weight:300;color:rgba(255,255,255,.6);line-height:1.75;flex:1}
.featured-meta{margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:space-between}
.featured-meta-left{display:flex;flex-direction:column;gap:.2rem}
.featured-date{font-size:.8rem;color:rgba(255,255,255,.5)}
.featured-read{font-size:.75rem;color:rgba(255,255,255,.35)}
.featured-cta{font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:.5rem;transition:gap var(--t)}
.featured-card:hover .featured-cta{gap:.75rem}

/* ARTICLES GRID */
.articles-wrap{max-width:1100px;margin:0 auto;padding:2rem 2.5rem 6rem}
.articles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem}
.article-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform var(--t),box-shadow var(--t)}
.article-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.08)}
.article-card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;filter:grayscale(75%);transition:filter .4s}
.article-card:hover .article-card-img{filter:grayscale(0%)}
.article-card-content{padding:1.5rem}
.article-card-meta{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center}
.article-card-cat{background:var(--bg);padding:.2rem .5rem;font-size:.65rem;letter-spacing:.08em;color:var(--ink-muted);border-radius:2px}
.article-card-title{font-family:var(--serif);font-size:1.1rem;line-height:1.3;color:var(--ink);margin-bottom:.6rem}
.article-card-excerpt{font-size:.82rem;font-weight:300;color:var(--ink-muted);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.article-card-footer{padding:.75rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.article-card-read{font-size:.7rem;color:var(--ink-faint)}
.article-card-arrow{font-size:.8rem;color:var(--ink-muted);transition:transform var(--t)}
.article-card:hover .article-card-arrow{transform:translateX(3px)}
.articles-empty{grid-column:1/-1;padding:4rem 0;text-align:center}
.articles-empty p{font-size:1rem;font-weight:300;color:var(--ink-faint);font-style:italic}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);align-items:flex-start;justify-content:center;padding:2rem;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);max-width:720px;width:100%;margin:auto;position:relative;overflow:hidden;border-radius:2px}
.modal-close{position:absolute;top:1rem;right:1rem;font-size:1.2rem;background:rgba(0,0,0,.5);border:none;cursor:pointer;color:#fff;width:36px;height:36px;display:flex;align-items:center;justify-content:center;z-index:10;border-radius:50%;transition:background var(--t)}
.modal-close:hover{background:rgba(0,0,0,.8)}
.modal-hero-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;filter:grayscale(60%)}
.modal-inner{padding:2.5rem 3rem 3rem}
.modal-meta{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:1rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.modal-meta-cat{background:var(--bg);padding:.2rem .6rem;color:var(--ink-muted);border-radius:2px}
.modal-title{font-family:var(--serif);font-size:clamp(1.5rem,3vw,2.2rem);line-height:1.15;color:var(--ink);margin-bottom:1.75rem}
.modal-divider{border:none;border-top:1px solid var(--border);margin:0 0 1.75rem}
.modal-body{font-size:1rem;font-weight:300;color:var(--ink-muted);line-height:1.85;text-align:justify;hyphens:auto}
.modal-body p+p{margin-top:1.1rem}
.modal-body strong{font-weight:500;color:var(--ink)}
.modal-body em{font-style:italic}
.modal-body ul{margin:.75rem 0 .75rem 1.25rem}
.modal-body a{color:var(--ink);border-bottom:1px solid var(--border);text-decoration:none;transition:border-color var(--t)}
.modal-body a:hover{border-color:var(--ink)}
.modal-body h2+p,.modal-body h3+p,.modal-body h4+p{margin-top:.5rem}

/* FOOTER */
.site-footer{background:var(--ink);border-top:1px solid rgba(255,255,255,.07);padding:1.5rem 2.5rem;display:flex;justify-content:space-between;align-items:center}
.site-footer p{font-size:.78rem;color:rgba(255,255,255,.3)}
.site-footer a{color:rgba(255,255,255,.4);text-decoration:none}
.site-footer a:hover{color:rgba(255,255,255,.7)}

/* LOADING */
.loading{grid-column:1/-1;text-align:center;padding:6rem 2rem;font-size:.9rem;font-weight:300;color:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.featured-card,.article-card{animation:fadeUp .5s ease both}

/* RESPONSIVE */
@media(max-width:900px){
  .site-header{padding:0 1.5rem}
  .nav-links{display:none}
  .nav-hamburger{display:flex}
  .articles-grid{grid-template-columns:repeat(2,1fr)}
  .featured-card{grid-template-columns:1fr}
  .featured-img-wrap{aspect-ratio:16/9}
  .featured-content{padding:2rem}
  .featured-wrap,.articles-wrap,.filters{padding-left:1.5rem;padding-right:1.5rem}
  .page-header{padding:calc(var(--nav-h) + 3rem) 1.5rem 2.5rem}
  .modal-inner{padding:2rem 1.5rem}
  .modal-overlay{padding:0;align-items:flex-end}
  .modal-box{border-radius:0}
  .site-footer{flex-direction:column;gap:.5rem;text-align:center}
}
@media(max-width:600px){
  .articles-grid{grid-template-columns:1fr}
  .page-stats{gap:1.5rem}
}
</style>

<script>
const SHEET_ID='2PACX-1vS9e2zmWZkr0CJ4PZR65tYOUOkJK7uYPpmHtfRl9LW69muNpulG27o0Ui8nS0jdOjorRNVypcGW3Iv5';
const GID_BLOG='1088622999';
const CSV_URL=`https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${GID_BLOG}&single=true&output=csv`;

function parseCSV(text){
  const raw=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const cells=[];let cur='',inQ=false,i=0;
  while(i<raw.length){const c=raw[i];if(c==='"'){if(inQ&&raw[i+1]==='"'){cur+='"';i+=2;continue;}inQ=!inQ;i++;continue;}if(c===','&&!inQ){cells.push(cur);cur='';i++;continue;}if(c==='\n'&&!inQ){cells.push(cur);cells.push('\n');cur='';i++;continue;}cur+=c;i++;}
  cells.push(cur);
  const allRows=[[]];cells.forEach(c=>{if(c==='\n')allRows.push([]);else allRows[allRows.length-1].push(c);});
  const headers=allRows[0].map(h=>h.trim()),rows=[];
  for(let r=1;r<allRows.length;r++){const v=allRows[r];if(!v.length||v.every(x=>!x.trim()))continue;const o={};headers.forEach((h,i)=>{o[h]=(v[i]||'').trim();});rows.push(o);}
  return rows;
}

function renderMarkdown(text){
  if(!text)return'';
  const lines=text.split('\n');let html='',inList=false;
  for(let i=0;i<lines.length;i++){
    let line=lines[i];const trimmed=line.trimStart();
    line=line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    line=line.replace(/\*\*\*(.*?)\*\*\*/g,'<strong><em>$1</em></strong>');
    line=line.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    line=line.replace(/(?<!\*)\*(?!\*)(.*?)(?<!\*)\*(?!\*)/g,'<em>$1</em>');
    line=line.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    line=line.replace(/`([^`]+)`/g,'<code style="font-family:monospace;font-size:.9em;background:rgba(0,0,0,.06);padding:.1em .3em;border-radius:3px">$1</code>');
    if(/^---+$/.test(trimmed)){if(inList){html+='</ul>';inList=false;}html+='<hr style="border:none;border-top:1px solid var(--border);margin:1.5rem 0">';continue;}
    if(/^# /.test(trimmed)){if(inList){html+='</ul>';inList=false;}html+=`<h2 style="font-family:var(--serif);font-size:1.5rem;line-height:1.2;color:var(--ink);margin:1.5rem 0 .75rem">${line.replace(/^#+ /,'')}</h2>`;continue;}
    if(/^## /.test(trimmed)){if(inList){html+='</ul>';inList=false;}html+=`<h3 style="font-family:var(--serif);font-size:1.2rem;line-height:1.2;color:var(--ink);margin:1.5rem 0 .5rem">${line.replace(/^##+ /,'')}</h3>`;continue;}
    if(/^### /.test(trimmed)){if(inList){html+='</ul>';inList=false;}html+=`<h4 style="font-size:1rem;font-weight:500;color:var(--ink);margin:1.25rem 0 .4rem">${line.replace(/^###+ /,'')}</h4>`;continue;}
    if(/^[*-] /.test(trimmed)){if(!inList){html+='<ul style="margin:.75rem 0 .75rem 1.25rem;display:flex;flex-direction:column;gap:.3rem">';inList=true;}html+=`<li style="font-size:1rem;font-weight:300;color:var(--ink-muted);line-height:1.75">${line.replace(/^[*-] /,'')}</li>`;continue;}
    if(/^> /.test(trimmed)){if(inList){html+='</ul>';inList=false;}html+=`<blockquote style="border-left:3px solid var(--border);padding:.5rem 1rem;margin:.75rem 0;font-style:italic;color:var(--ink-muted)">${line.replace(/^> /,'')}</blockquote>`;continue;}
    if(trimmed===''){if(inList){html+='</ul>';inList=false;}continue;}
    if(inList){html+='</ul>';inList=false;}
    html+=`<p>${line}</p>`;
  }
  if(inList)html+='</ul>';
  return html;
}

function stripMarkdown(text){
  if(!text)return'';
  return text.replace(/#{1,6} /g,'').replace(/\*\*\*(.*?)\*\*\*/g,'$1').replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/`([^`]+)`/g,'$1').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/^[*>-] /gm,'').replace(/^---+$/gm,'').replace(/\n+/g,' ').trim();
}

function readTime(text){
  if(!text||!text.trim())return null;
  const w=text.replace(/<[^>]+>/g,'').split(/\s+/).filter(Boolean).length;
  return `${Math.max(1,Math.round(w/200))} min`;
}

function formatDate(raw){
  if(!raw)return'';
  const months={gennaio:'Gen',febbraio:'Feb',marzo:'Mar',aprile:'Apr',maggio:'Mag',giugno:'Giu',luglio:'Lug',agosto:'Ago',settembre:'Set',ottobre:'Ott',novembre:'Nov',dicembre:'Dic'};
  const d=raw.toLowerCase();
  for(const[it,abbr]of Object.entries(months)){
    if(d.includes(it)){const nm=d.match(/\b(\d{1,2})\b/),ym=d.match(/\b(\d{4})\b/);const yr=ym?ym[1]:'';const dy=nm&&nm[1]!==yr?nm[1]:'';return dy?`${dy} ${abbr} ${yr}`.trim():`${abbr} ${yr}`.trim();}
  }
  return raw;
}

function getFoto(r){const k=Object.keys(r).find(k=>k.toLowerCase().includes('foto'))||'foto';return r[k]||'';}

let allArticles=[],filtered=[];

function buildFilters(articles){
  const cats=[...new Set(articles.map(a=>a.categoria).filter(Boolean))];
  const bar=document.getElementById('filters');
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='filter-btn';btn.dataset.cat=cat;btn.textContent=cat;
    btn.setAttribute('aria-pressed','false');
    btn.onclick=()=>filterBy(cat);
    bar.appendChild(btn);
  });
  document.getElementById('stat-count').textContent=articles.length;
  document.getElementById('stat-cats').textContent=cats.length||'—';
}

function filterBy(cat){
  document.querySelectorAll('.filter-btn').forEach(b=>{
    const active=b.dataset.cat===cat;
    b.classList.toggle('active',active);
    b.setAttribute('aria-pressed',active);
  });
  filtered=cat==='tutti'?allArticles:allArticles.filter(a=>a.categoria===cat);
  renderPage();
}

function renderPage(){
  if(!filtered.length){
    document.getElementById('featured-wrap').innerHTML='';
    document.getElementById('articles-grid').innerHTML='<div class="articles-empty"><p>Nessun articolo in questa categoria.</p></div>';
    return;
  }
  const[first,...rest]=filtered;
  renderFeatured(first);
  renderGrid(rest);
}

function renderFeatured(r){
  const idx=filtered.indexOf(r);
  const foto=getFoto(r);const rt=readTime(r.testo_completo);
  const hasFull=r.testo_completo&&r.testo_completo.trim().length>0;
  const imgEl=foto?`<div class="featured-img-wrap"><img class="featured-img" src="${foto}" alt="Immagine: ${r.titolo||''}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`:`<div class="featured-img-wrap"><div class="featured-img-placeholder" aria-hidden="true"></div></div>`;
  document.getElementById('featured-wrap').innerHTML=`
    <article class="featured-card"${hasFull?` onclick="onArticleClick(${idx})" role="button" tabindex="0" aria-label="Leggi: ${(r.titolo||'').replace(/"/g,'')}" onkeydown="if(event.key==='Enter')onArticleClick(${idx})"`:''}> 
      ${imgEl}
      <div class="featured-content">
        <div>
          <p class="featured-badge">${r.categoria||'In evidenza'}</p>
          <h2 class="featured-title">${r.titolo||''}</h2>
          <p class="featured-excerpt">${stripMarkdown(r.estratto||'')}</p>
        </div>
        <div class="featured-meta">
          <div class="featured-meta-left">
            <time class="featured-date">${formatDate(r.data)}</time>
            ${rt?`<span class="featured-read">${rt} di lettura</span>`:''}
          </div>
          ${hasFull?'<span class="featured-cta">Leggi <span aria-hidden="true">→</span></span>':''}
        </div>
      </div>
    </article>`;
}

function renderGrid(articles){
  const grid=document.getElementById('articles-grid');
  if(!articles.length){grid.innerHTML='';return;}
  grid.innerHTML=articles.map((r,i)=>{
    const idx=filtered.indexOf(r);
    const foto=getFoto(r);const rt=readTime(r.testo_completo);
    const hasFull=r.testo_completo&&r.testo_completo.trim().length>0;
    return `<article class="article-card"${hasFull?` onclick="onArticleClick(${idx})" role="button" tabindex="0" aria-label="Leggi: ${(r.titolo||'').replace(/"/g,'')}" onkeydown="if(event.key==='Enter')onArticleClick(${idx})"`:''} style="animation-delay:${i*.06}s">
      ${foto?`<img class="article-card-img" src="${foto}" alt="Immagine: ${r.titolo||''}" loading="lazy" onerror="this.style.display='none'">`:'' }
      <div class="article-card-content">
        <div class="article-card-meta">
          <time>${formatDate(r.data)}</time>
          ${r.categoria?`<span class="article-card-cat">${r.categoria}</span>`:''}
        </div>
        <h3 class="article-card-title">${r.titolo||''}</h3>
        <p class="article-card-excerpt">${stripMarkdown(r.estratto||'')}</p>
      </div>
      ${hasFull||rt?`<div class="article-card-footer">
        <span class="article-card-read">${rt?rt+' di lettura':''}</span>
        ${hasFull?'<span class="article-card-arrow" aria-hidden="true">→</span>':''}
      </div>`:''}
    </article>`;
  }).join('');
}

let lastFocused=null;
function onArticleClick(i){
  const r=filtered[i];
  const foto=getFoto(r);const rt=readTime(r.testo_completo);
  const img=document.getElementById('modal-hero-img');
  if(foto){img.src=foto;img.alt=`Immagine: ${r.titolo||''}`;img.style.display='block';img.onerror=()=>img.style.display='none';}
  else img.style.display='none';
  document.getElementById('modal-date').textContent=formatDate(r.data);
  const catEl=document.getElementById('modal-cat');catEl.textContent=r.categoria||'';catEl.style.display=r.categoria?'inline':'none';
  document.getElementById('modal-read').textContent=rt?rt+' di lettura':'';
  document.getElementById('modal-title').textContent=r.titolo||'';
  document.getElementById('modal-body').innerHTML=renderMarkdown(r.testo_completo||'');
  lastFocused=document.activeElement;
  const ov=document.getElementById('modal-overlay');
  ov.classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>ov.querySelector('.modal-close')?.focus(),50);
}
function closeModal(e,force){
  if(force||(e&&e.target===document.getElementById('modal-overlay'))){
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow='';
    lastFocused?.focus();
  }
}

function toggleMenu(){
  const btn=document.getElementById('hamburger'),menu=document.getElementById('nav-mobile');
  if(!btn||!menu)return;
  const open=menu.classList.toggle('open');
  btn.setAttribute('aria-expanded',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeMenu(){
  const btn=document.getElementById('hamburger'),menu=document.getElementById('nav-mobile');
  if(!btn||!menu)return;
  menu.classList.remove('open');btn.setAttribute('aria-expanded','false');document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeMenu();closeModal(null,true);}});

document.getElementById('footer-year').textContent=new Date().getFullYear();

async function init(){
  try{
    const res=await fetch(CSV_URL);
    const rows=parseCSV(await res.text());
    const pk=Object.keys(rows[0]||{}).find(k=>k.toLowerCase().includes('pubblicato'))||'pubblicato';
    allArticles=rows.filter(r=>(r[pk]||'').trim().toUpperCase()==='SI');
    filtered=allArticles;
    buildFilters(allArticles);
    renderPage();
  }catch(e){
    document.getElementById('articles-grid').innerHTML='<div class="articles-empty"><p>Errore nel caricamento degli articoli.</p></div>';
    console.error(e);
  }
}
init();
</script>
</body>
