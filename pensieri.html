<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pensieri — Mattia Farinaro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --ink: #111111;
    --ink-muted: #6b6b6b; --ink-faint: #c4c4c4; --border: rgba(0,0,0,0.1);
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--sans); background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 16px; line-height: 1.6; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 160; display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2.5rem; background: rgba(247,245,240,0.88); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: var(--serif); font-size: 1.1rem; color: var(--ink); text-decoration: none; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-size: 0.85rem; font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }
  .nav-hamburger { display: none; flex-direction: column; justify-content: center; align-items: center; gap: 5px; width: 44px; height: 44px; background: none; border: none; cursor: pointer; padding: 0; position: relative; z-index: 200; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
  .nav-hamburger span { display: block; width: 22px; height: 1.5px; background: var(--ink); transition: transform 0.25s, opacity 0.25s; transform-origin: center; }
  .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
  .nav-mobile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; position: fixed; inset: 0; z-index: 150; background: rgba(247,245,240,0.98); backdrop-filter: blur(12px); opacity: 0; visibility: hidden; transition: opacity 0.25s, visibility 0.25s; pointer-events: none; }
  .nav-mobile.open { opacity: 1; visibility: visible; pointer-events: auto; }
  .nav-mobile a { font-family: var(--serif); font-size: 2.2rem; color: var(--ink); text-decoration: none; letter-spacing: -0.01em; transition: opacity 0.2s; }
  .nav-mobile a:hover { opacity: 0.45; }

  /* PAGE HEADER */
  .page-header { padding: 9rem 2.5rem 4rem; max-width: 1100px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem; flex-wrap: wrap; }
  .page-header-left {}
  .page-eyebrow { font-size: 0.78rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; }
  .page-eyebrow::before { content: ''; display: inline-block; width: 2rem; height: 1px; background: var(--ink-muted); }
  .page-title { font-family: var(--serif); font-size: clamp(3rem, 6vw, 5rem); line-height: 1.0; letter-spacing: -0.02em; color: var(--ink); }
  .page-title em { font-style: italic; color: var(--ink-muted); }
  .page-stats { display: flex; gap: 2.5rem; padding-bottom: 0.5rem; }
  .page-stat-num { font-family: var(--serif); font-size: 2rem; line-height: 1; color: var(--ink); }
  .page-stat-label { font-size: 0.78rem; font-weight: 300; color: var(--ink-muted); margin-top: 0.2rem; }

  /* FILTERS */
  .filters-wrap { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); sticky; top: 64px; z-index: 10; }
  .filters { max-width: 1100px; margin: 0 auto; padding: 0 2.5rem; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { font-size: 0.8rem; font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-muted); background: none; border: none; border-bottom: 2px solid transparent; padding: 1rem 1.25rem; cursor: pointer; white-space: nowrap; transition: color 0.2s, border-color 0.2s; }
  .filter-btn:hover { color: var(--ink); }
  .filter-btn.active { color: var(--ink); border-bottom-color: var(--ink); }

  /* FEATURED ARTICLE */
  .featured-wrap { max-width: 1100px; margin: 0 auto; padding: 3rem 2.5rem 0; }
  .featured-card { display: grid; grid-template-columns: 1fr 1fr; gap: 0; background: var(--ink); color: #fff; cursor: pointer; overflow: hidden; transition: opacity 0.2s; }
  .featured-card:hover { opacity: 0.92; }
  .featured-img-wrap { overflow: hidden; aspect-ratio: 4/3; }
  .featured-img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(75%); transition: filter 0.4s; }
  .featured-card:hover .featured-img { filter: grayscale(0%); }
  .featured-img-placeholder { width: 100%; height: 100%; min-height: 300px; background: #222; }
  .featured-content { padding: 3rem; display: flex; flex-direction: column; justify-content: space-between; }
  .featured-badge { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
  .featured-badge::before { content: ''; display: inline-block; width: 1.5rem; height: 1px; background: rgba(255,255,255,0.4); }
  .featured-title { font-family: var(--serif); font-size: clamp(1.5rem, 2.5vw, 2rem); line-height: 1.2; color: #fff; margin-bottom: 1.5rem; }
  .featured-excerpt { font-size: 0.92rem; font-weight: 300; color: rgba(255,255,255,0.6); line-height: 1.75; flex: 1; }
  .featured-meta { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: space-between; }
  .featured-meta-left { display: flex; flex-direction: column; gap: 0.2rem; }
  .featured-date { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
  .featured-read { font-size: 0.75rem; color: rgba(255,255,255,0.35); }
  .featured-cta { font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 0.5rem; }

  /* ARTICLES GRID */
  .articles-wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 2.5rem 6rem; }
  .articles-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
  .article-card { background: var(--surface); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform 0.2s; }
  .article-card:hover { transform: translateY(-3px); }
  .article-card-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; filter: grayscale(75%); transition: filter 0.4s; }
  .article-card:hover .article-card-img { filter: grayscale(0%); }
  .article-card-content { padding: 1.5rem; }
  .article-card-meta { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.6rem; display: flex; justify-content: space-between; align-items: center; }
  .article-card-cat { background: var(--bg); padding: 0.2rem 0.5rem; font-size: 0.65rem; letter-spacing: 0.08em; color: var(--ink-muted); }
  .article-card-title { font-family: var(--serif); font-size: 1.1rem; line-height: 1.3; color: var(--ink); margin-bottom: 0.6rem; }
  .article-card-excerpt { font-size: 0.82rem; font-weight: 300; color: var(--ink-muted); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .article-card-footer { padding: 0.75rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .article-card-read { font-size: 0.7rem; color: var(--ink-faint); }
  .article-card-arrow { font-size: 0.8rem; color: var(--ink-muted); }

  /* EMPTY STATE */
  .articles-empty { grid-column: 1/-1; padding: 4rem 0; text-align: center; }
  .articles-empty p { font-size: 1rem; font-weight: 300; color: var(--ink-faint); font-style: italic; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6); align-items: flex-start; justify-content: center; padding: 2rem; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--surface); max-width: 720px; width: 100%; margin: auto; padding: 0; position: relative; overflow: hidden; }
  .modal-close { position: absolute; top: 1.25rem; right: 1.5rem; font-size: 1.4rem; background: rgba(0,0,0,0.4); border: none; cursor: pointer; color: #fff; line-height: 1; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background 0.2s; }
  .modal-close:hover { background: rgba(0,0,0,0.7); }
  .modal-hero-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; filter: grayscale(75%); }
  .modal-inner { padding: 2.5rem 3rem 3rem; }
  .modal-meta { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.75rem; display: flex; gap: 1rem; align-items: center; }
  .modal-meta-cat { background: var(--bg); padding: 0.2rem 0.6rem; color: var(--ink-muted); }
  .modal-title { font-family: var(--serif); font-size: clamp(1.5rem, 3vw, 2.2rem); line-height: 1.15; color: var(--ink); margin-bottom: 2rem; }
  .modal-body { font-size: 1rem; font-weight: 300; color: var(--ink-muted); line-height: 1.85; text-align: justify; hyphens: auto; }
  .modal-body p + p { margin-top: 1.1rem; }
  .modal-body a { color: var(--ink); border-bottom: 1px solid var(--border); text-decoration: none; transition: border-color 0.2s; }
  .modal-body a:hover { border-color: var(--ink); }
  .modal-divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

  /* FOOTER */
  footer { background: var(--ink); padding: 1.5rem 2.5rem; display: flex; justify-content: space-between; align-items: center; }
  footer p { font-size: 0.78rem; color: rgba(255,255,255,0.3); }

  /* LOADING */
  .loading { text-align: center; padding: 6rem 2rem; font-size: 0.9rem; font-weight: 300; color: var(--ink-faint); letter-spacing: 0.06em; text-transform: uppercase; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .articles-grid { grid-template-columns: repeat(2, 1fr); }
    .featured-card { grid-template-columns: 1fr; }
    .featured-img-wrap { aspect-ratio: 16/9; }
    .featured-content { padding: 2rem; }
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    .nav-hamburger { display: flex; }
    .page-header { padding: 7rem 1.5rem 2.5rem; }
    .featured-wrap, .articles-wrap, .filters { padding-left: 1.5rem; padding-right: 1.5rem; }
    .modal-inner { padding: 2rem 1.5rem; }
    footer { flex-direction: column; gap: 0.5rem; text-align: center; }
  }
  @media (max-width: 600px) {
    .articles-grid { grid-template-columns: 1fr; }
    .page-stats { gap: 1.5rem; }
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .featured-card { animation: fadeUp 0.5s ease both; }
  .article-card { animation: fadeUp 0.5s ease both; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">Mattia Farinaro</a>
  <ul class="nav-links">
    <li><a href="index.html#about">Chi sono</a></li>
    <li><a href="index.html#ruolo">Ruolo</a></li>
    <li><a href="pensieri.html" class="active">Pensieri</a></li>

  </ul>
  <button class="nav-hamburger" id="hamburger" aria-label="Menu" onclick="toggleMenu()">
    <span></span><span></span><span></span>

</nav>

<div class="nav-mobile" id="nav-mobile">
  <a href="index.html#about"  onclick="closeMenu()">Chi sono</a>
  <a href="index.html#ruolo"  onclick="closeMenu()">Ruolo</a>
  <a href="pensieri.html"     onclick="closeMenu()">Pensieri</a>
  <a href="index.html#contatti" onclick="closeMenu()">Contatti</a>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-left">
    <p class="page-eyebrow">Mattia Farinaro</p>
    <h1 class="page-title">Pensieri<br><em>e riflessioni</em></h1>
  </div>
  <div class="page-stats" id="page-stats">
    <div>
      <p class="page-stat-num" id="stat-count">—</p>
      <p class="page-stat-label">Articoli pubblicati</p>
    </div>
    <div>
      <p class="page-stat-num" id="stat-cats">—</p>
      <p class="page-stat-label">Categorie</p>
    </div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters-wrap">
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="tutti" onclick="filterBy('tutti')">Tutti</button>
  </div>
</div>

<!-- FEATURED -->
<div class="featured-wrap" id="featured-wrap"></div>

<!-- GRID -->
<div class="articles-wrap">
  <div class="articles-grid" id="articles-grid">
    <div class="loading">Caricamento articoli...</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal(null, true)">×</button>
    <img id="modal-hero-img" class="modal-hero-img" src="" alt="" style="display:none">
    <div class="modal-inner">
      <div class="modal-meta">
        <span id="modal-date"></span>
        <span id="modal-cat" class="modal-meta-cat"></span>
        <span id="modal-read"></span>
      </div>
      <h2 class="modal-title" id="modal-title"></h2>
      <hr class="modal-divider">
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2025 Mattia Farinaro</p>
  <p>Trento, Provincia Autonoma di Trento</p>
</footer>

<script>
const SHEET_ID = '2PACX-1vS9e2zmWZkr0CJ4PZR65tYOUOkJK7uYPpmHtfRl9LW69muNpulG27o0Ui8nS0jdOjorRNVypcGW3Iv5';
const GID_BLOG = '1088622999';
const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${GID_BLOG}&single=true&output=csv`;

let allArticles = [];
let filtered = [];
let currentCat = 'tutti';

function parseCSV(text) {
  const raw = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const cells = [];
  let cur = '', inQ = false, i = 0;
  while (i < raw.length) {
    const c = raw[i];
    if (c === '"') {
      if (inQ && raw[i+1] === '"') { cur += '"'; i += 2; continue; }
      inQ = !inQ; i++; continue;
    }
    if (c === ',' && !inQ) { cells.push(cur); cur = ''; i++; continue; }
    if (c === '\n' && !inQ) { cells.push(cur); cells.push('\n'); cur = ''; i++; continue; }
    cur += c; i++;
  }
  cells.push(cur);
  const allRows = [[]];
  cells.forEach(cell => {
    if (cell === '\n') allRows.push([]);
    else allRows[allRows.length - 1].push(cell);
  });
  const headers = allRows[0].map(h => h.trim());
  const rows = [];
  for (let r = 1; r < allRows.length; r++) {
    const vals = allRows[r];
    if (!vals.length || vals.every(v => !v.trim())) continue;
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (vals[idx] || '').trim(); });
    rows.push(obj);
  }
  return rows;
}

function readTime(text) {
  if (!text) return null;
  const words = text.replace(/<[^>]+>/g, '').split(/\s+/).filter(Boolean).length;
  const mins = Math.max(1, Math.round(words / 200));
  return `${mins} min`;
}

function formatDate(raw) {
  if (!raw) return '';
  const months = { 'gennaio':' Gen','febbraio':' Feb','marzo':' Mar','aprile':' Apr','maggio':' Mag','giugno':' Giu','luglio':' Lug','agosto':' Ago','settembre':' Set','ottobre':' Ott','novembre':' Nov','dicembre':' Dic' };
  let d = raw.toLowerCase();
  for (const [it, abbr] of Object.entries(months)) {
    if (d.includes(it)) {
      const num = d.match(/\d+/);
      const year = d.match(/\d{4}/);
      if (num && year && num[0] !== year[0]) return `${num[0]}${abbr} ${year[0]}`;
      if (year) return `${abbr.trim()} ${year[0]}`;
    }
  }
  return raw;
}

function buildFilters(articles) {
  const cats = [...new Set(articles.map(a => a.categoria).filter(Boolean))];
  const bar = document.getElementById('filters');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.onclick = () => filterBy(cat);
    bar.appendChild(btn);
  });
  document.getElementById('stat-count').textContent = articles.length;
  document.getElementById('stat-cats').textContent = cats.length || '—';
}

function filterBy(cat) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  filtered = cat === 'tutti' ? allArticles : allArticles.filter(a => a.categoria === cat);
  renderPage();
}

function renderPage() {
  if (!filtered.length) {
    document.getElementById('featured-wrap').innerHTML = '';
    document.getElementById('articles-grid').innerHTML = '<div class="articles-empty"><p>Nessun articolo in questa categoria.</p></div>';
    return;
  }

  const [first, ...rest] = filtered;
  renderFeatured(first, 0);
  renderGrid(rest);
}

function getFoto(r) {
  const k = Object.keys(r).find(k => k.toLowerCase().includes('foto')) || 'foto';
  return r[k] || '';
}

function renderFeatured(r, idx) {
  const foto = getFoto(r);
  const rt = readTime(r.testo_completo);
  const hasFull = r.testo_completo && r.testo_completo.trim().length > 0;
  const imgEl = foto
    ? `<div class="featured-img-wrap"><img class="featured-img" src="${foto}" alt="${r.titolo||''}" onerror="this.parentElement.style.display='none'"></div>`
    : `<div class="featured-img-wrap"><div class="featured-img-placeholder"></div></div>`;

  document.getElementById('featured-wrap').innerHTML = `
    <div class="featured-card" ${hasFull ? `onclick="openModal(${idx})"` : ''}>
      ${imgEl}
      <div class="featured-content">
        <div>
          <p class="featured-badge">${r.categoria || 'In evidenza'}</p>
          <h2 class="featured-title">${r.titolo || ''}</h2>
          <p class="featured-excerpt">${r.estratto || ''}</p>
        </div>
        <div class="featured-meta">
          <div class="featured-meta-left">
            <span class="featured-date">${formatDate(r.data)}</span>
            ${rt ? `<span class="featured-read">${rt} di lettura</span>` : ''}
          </div>
          ${hasFull ? '<span class="featured-cta">Leggi →</span>' : ''}
        </div>
      </div>
    </div>`;
}

function renderGrid(articles) {
  const grid = document.getElementById('articles-grid');
  if (!articles.length) { grid.innerHTML = ''; return; }
  grid.innerHTML = '';
  articles.forEach((r, i) => {
    const idx = filtered.indexOf(r);
    const foto = getFoto(r);
    const rt = readTime(r.testo_completo);
    const hasFull = r.testo_completo && r.testo_completo.trim().length > 0;
    const imgEl = foto ? `<img class="article-card-img" src="${foto}" alt="${r.titolo||''}" onerror="this.style.display='none'">` : '';
    grid.innerHTML += `
      <div class="article-card" ${hasFull ? `onclick="openModal(${idx})"` : ''} style="animation-delay:${i*0.06}s">
        ${imgEl}
        <div class="article-card-content">
          <div class="article-card-meta">
            <span>${formatDate(r.data)}</span>
            ${r.categoria ? `<span class="article-card-cat">${r.categoria}</span>` : ''}
          </div>
          <h3 class="article-card-title">${r.titolo || ''}</h3>
          <p class="article-card-excerpt">${r.estratto || ''}</p>
        </div>
        ${hasFull || rt ? `<div class="article-card-footer">
          <span class="article-card-read">${rt ? rt + ' di lettura' : ''}</span>
          ${hasFull ? '<span class="article-card-arrow">→</span>' : ''}
        </div>` : ''}
      </div>`;
  });
}

function openModal(i) {
  const r = filtered[i];
  const foto = getFoto(r);
  const rt = readTime(r.testo_completo);
  const img = document.getElementById('modal-hero-img');
  if (foto) { img.src = foto; img.alt = r.titolo||''; img.style.display = 'block'; img.onerror = () => img.style.display = 'none'; }
  else img.style.display = 'none';
  document.getElementById('modal-date').textContent = formatDate(r.data);
  document.getElementById('modal-cat').textContent = r.categoria || '';
  document.getElementById('modal-cat').style.display = r.categoria ? 'inline' : 'none';
  document.getElementById('modal-read').textContent = rt ? rt + ' di lettura' : '';
  document.getElementById('modal-title').textContent = r.titolo || '';
  const paras = (r.testo_completo || '').split(/\n+/).filter(p => p.trim());
  document.getElementById('modal-body').innerHTML = paras.map(p => `<p>${p}</p>`).join('');
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e, force) {
  if (force || (e && e.target === document.getElementById('modal-overlay'))) {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(null, true); });

function toggleMenu() {
  const btn = document.getElementById('hamburger');
  const menu = document.getElementById('nav-mobile');
  btn.classList.toggle('open');
  menu.classList.toggle('open');
  document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
}
function closeMenu() {
  document.getElementById('hamburger').classList.remove('open');
  document.getElementById('nav-mobile').classList.remove('open');
  document.body.style.overflow = '';
}

async function init() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const rows = parseCSV(text);
    const pubKey = Object.keys(rows[0] || {}).find(k => k.toLowerCase().includes('pubblicato')) || 'pubblicato';
    allArticles = rows.filter(r => (r[pubKey] || '').trim().toUpperCase() === 'SI');
    filtered = allArticles;
    buildFilters(allArticles);
    renderPage();
  } catch(e) {
    document.getElementById('articles-grid').innerHTML = '<div class="articles-empty"><p>Errore nel caricamento degli articoli.</p></div>';
    console.error(e);
  }
}

init();
</script>
