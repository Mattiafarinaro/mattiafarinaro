<style>
/* ── PAGE HEADER ── */
.page-header{padding:calc(var(--nav-h) + 5rem) 2.5rem 4rem;max-width:var(--max-w);margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.page-eyebrow{font-size:.75rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:1rem;display:flex;align-items:center;gap:.75rem}
.page-eyebrow::before{content:'';display:inline-block;width:2rem;height:1px;background:var(--ink-muted)}
.page-title{font-family:var(--serif);font-size:clamp(3rem,6vw,5rem);line-height:1;letter-spacing:-.02em;color:var(--ink)}
.page-title em{font-style:italic;color:var(--ink-muted)}
.page-stats{display:flex;gap:2.5rem;padding-bottom:.5rem}
.page-stat-num{font-family:var(--serif);font-size:2rem;line-height:1;color:var(--ink)}
.page-stat-label{font-size:.78rem;font-weight:300;color:var(--ink-muted);margin-top:.2rem}
/* FILTERS */
.filters-wrap{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:sticky;top:var(--nav-h);z-index:10}
.filters{max-width:var(--max-w);margin:0 auto;padding:0 2.5rem;display:flex;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{font-size:.78rem;font-weight:400;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-muted);background:none;border:none;border-bottom:2px solid transparent;padding:1rem 1.25rem;cursor:pointer;white-space:nowrap;transition:color var(--t),border-color var(--t)}
.filter-btn:hover{color:var(--ink)}
.filter-btn.active{color:var(--ink);border-bottom-color:var(--ink)}
/* FEATURED */
.featured-wrap{max-width:var(--max-w);margin:0 auto;padding:3rem 2.5rem 0}
.featured-card{display:grid;grid-template-columns:1fr 1fr;background:var(--ink);color:#fff;cursor:pointer;overflow:hidden;transition:opacity var(--t)}
.featured-card:hover{opacity:.92}
.featured-img-wrap{overflow:hidden;aspect-ratio:4/3}
.featured-img{width:100%;height:100%;object-fit:cover;display:block}
.featured-card:hover .featured-img{filter:grayscale(0%)}
.featured-img-placeholder{width:100%;height:100%;min-height:300px;background:#1a1a1a}
.featured-content{padding:3rem;display:flex;flex-direction:column;justify-content:space-between}
.featured-badge{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem}
.featured-badge::before{content:'';display:inline-block;width:1.5rem;height:1px;background:rgba(255,255,255,.4)}
.featured-title{font-family:var(--serif);font-size:clamp(1.5rem,2.5vw,2rem);line-height:1.2;color:#fff;margin-bottom:1.5rem}
.featured-excerpt{font-size:.92rem;font-weight:300;color:rgba(255,255,255,.6);line-height:1.75;flex:1}
.featured-meta{margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:space-between}
.featured-meta-left{display:flex;flex-direction:column;gap:.2rem}
.featured-date{font-size:.8rem;color:rgba(255,255,255,.5)}
.featured-read{font-size:.75rem;color:rgba(255,255,255,.35)}
.featured-cta{font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:.5rem;transition:gap var(--t)}
.featured-card:hover .featured-cta{gap:.75rem}
/* ARTICLES GRID */
.articles-wrap{max-width:var(--max-w);margin:0 auto;padding:2rem 2.5rem 6rem}
.articles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem}
.article-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform var(--t),box-shadow var(--t)}
.article-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.08)}
.article-card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.article-card:hover .article-card-img{filter:grayscale(0%)}
.article-card-content{padding:1.5rem}
.article-card-meta{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.article-card-cat{background:var(--bg);padding:.2rem .5rem;font-size:.65rem;letter-spacing:.08em;color:var(--ink-muted);border-radius:2px;white-space:nowrap}
.article-card-title{font-family:var(--serif);font-size:1.1rem;line-height:1.3;color:var(--ink);margin-bottom:.6rem}
.article-card-excerpt{font-size:.82rem;font-weight:300;color:var(--ink-muted);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.article-card-footer{padding:.75rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.article-card-read{font-size:.7rem;color:var(--ink-faint)}
.article-card-arrow{font-size:.8rem;color:var(--ink-muted);transition:transform var(--t)}
.article-card:hover .article-card-arrow{transform:translateX(3px)}
.articles-empty{grid-column:1/-1;padding:4rem 0;text-align:center}
.articles-empty p{font-size:1rem;font-weight:300;color:var(--ink-faint);font-style:italic}
/* LOADING */
.loading{grid-column:1/-1;text-align:center;padding:5rem 2rem;font-size:.85rem;font-weight:300;color:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase}
/* MODAL extra (meta con cat separata) */
.modal-meta-row{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:1rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
/* ANIMATIONS */
.featured-card{animation:fadeUp .5s ease both}
.article-card{animation:fadeUp .45s ease both}
/* RESPONSIVE */
@media(max-width:900px){
  .articles-grid{grid-template-columns:repeat(2,1fr)}
  .featured-card{grid-template-columns:1fr}
  .featured-img-wrap{aspect-ratio:16/9}
  .featured-content{padding:2rem}
  .featured-wrap,.articles-wrap,.filters{padding-left:1.5rem;padding-right:1.5rem}
  .page-header{padding:calc(var(--nav-h) + 3rem) 1.5rem 2.5rem}
}
@media(max-width:600px){
  .articles-grid{grid-template-columns:1fr}
  .page-stats{gap:1.5rem}
}

<script src="shared.js"></script>
<script>
let allArticles=[], filtered=[];

function buildFilters(articles){
  const cats=[...new Set(articles.map(a=>a.categoria).filter(Boolean))];
  const bar=document.getElementById('filters');
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='filter-btn';btn.dataset.cat=cat;btn.textContent=cat;
    btn.setAttribute('aria-pressed','false');
    btn.onclick=()=>filterBy(cat);
    bar.appendChild(btn);
  });
  document.getElementById('stat-count').textContent=articles.length;
  document.getElementById('stat-cats').textContent=cats.length||'—';
}

function filterBy(cat){
  document.querySelectorAll('.filter-btn').forEach(b=>{
    const active=b.dataset.cat===cat;b.classList.toggle('active',active);b.setAttribute('aria-pressed',active);
  });
  filtered=cat==='tutti'?allArticles:allArticles.filter(a=>a.categoria===cat);
  setModalData(filtered);
  renderPage();
}

function renderPage(){
  if(!filtered.length){
    document.getElementById('featured-wrap').innerHTML='';
    document.getElementById('articles-grid').innerHTML='<div class="articles-empty"><p>Nessun articolo in questa categoria.</p></div>';
    return;
  }
  const[first,...rest]=filtered;
  renderFeatured(first);
  renderGrid(rest);
}

function renderFeatured(r){
  const idx=filtered.indexOf(r);
  const foto=getFoto(r),rt=readTime(r.testo_completo);
  const hasFull=r.testo_completo&&r.testo_completo.trim().length>0;
  const imgEl=foto
    ?`<div class="featured-img-wrap"><img class="featured-img" src="${foto}" alt="Immagine: ${r.titolo||''}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`
    :`<div class="featured-img-wrap"><div class="featured-img-placeholder" aria-hidden="true"></div></div>`;
  document.getElementById('featured-wrap').innerHTML=`
    <article class="featured-card"${hasFull?` onclick="openModal(${idx})" role="button" tabindex="0" aria-label="Leggi: ${(r.titolo||'').replace(/"/g,'')}" onkeydown="if(event.key==='Enter')openModal(${idx})"`:''}>
      ${imgEl}
      <div class="featured-content">
        <div>
          <p class="featured-badge">${r.categoria||'In evidenza'}</p>
          <h2 class="featured-title">${r.titolo||''}</h2>
          <p class="featured-excerpt">${stripMarkdown(r.estratto||'')}</p>
        </div>
        <div class="featured-meta">
          <div class="featured-meta-left">
            <time class="featured-date">${formatDate(r.data)}</time>
            ${rt?`<span class="featured-read">${rt} di lettura</span>`:''}
          </div>
          ${hasFull?'<span class="featured-cta">Leggi <span aria-hidden="true">→</span></span>':''}
        </div>
      </div>
    </article>`;
}

function renderGrid(articles){
  const grid=document.getElementById('articles-grid');
  if(!articles.length){grid.innerHTML='';return;}
  grid.innerHTML=articles.map((r,i)=>{
    const idx=filtered.indexOf(r);
    const foto=getFoto(r),rt=readTime(r.testo_completo);
    const hasFull=r.testo_completo&&r.testo_completo.trim().length>0;
    return `<article class="article-card"${hasFull?` onclick="openModal(${idx})" role="button" tabindex="0" aria-label="Leggi: ${(r.titolo||'').replace(/"/g,'')}" onkeydown="if(event.key==='Enter')openModal(${idx})"`:''} style="animation-delay:${i*.06}s">
      ${foto?`<img class="article-card-img" src="${foto}" alt="Immagine: ${r.titolo||''}" loading="lazy" onerror="this.style.display='none'">`:'' }
      <div class="article-card-content">
        <div class="article-card-meta">
          <time>${formatDate(r.data)}</time>
          ${r.categoria?`<span class="article-card-cat">${r.categoria}</span>`:''}
        </div>
        <h3 class="article-card-title">${r.titolo||''}</h3>
        <p class="article-card-excerpt">${stripMarkdown(r.estratto||'')}</p>
      </div>
      ${hasFull||rt?`<div class="article-card-footer">
        <span class="article-card-read">${rt?rt+' di lettura':''}</span>
        ${hasFull?'<span class="article-card-arrow" aria-hidden="true">→</span>':''}
      </div>`:''}
    </article>`;
  }).join('');
}

async function init(){
  try{
    const res=await fetch(BASE_CSV+GID.blog);
    const rows=parseCSV(await res.text());
    const pk=Object.keys(rows[0]||{}).find(k=>k.toLowerCase().includes('pubblicato'))||'pubblicato';
    allArticles=rows.filter(r=>(r[pk]||'').trim().toUpperCase()==='SI');
    filtered=allArticles;
    setModalData(filtered);
    buildFilters(allArticles);
    renderPage();
    // Auto-open article from URL
    const slug=new URLSearchParams(window.location.search).get('a');
    if(slug){const idx=filtered.findIndex(r=>slugify(r.titolo)===slug);if(idx!==-1)openModal(idx,true);}
  }catch(e){
    document.getElementById('articles-grid').innerHTML='<div class="articles-empty"><p>Errore nel caricamento degli articoli.</p></div>';
    console.error(e);
  }
}
init();
</script>
